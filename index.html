<html lang="km">
<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --panel-bg: #131926;
            --panel-card: #1c2536;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --border: #222f45;
            --svg-bg: #070a10;
        }

        * {
            box-sizing: border-box;
            font-family: 'Kantumruy Pro', system-ui, sans-serif !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-logo {
            height: 40px;
            width: auto;
            border-radius: 6px;
        }

        header h1 { font-size: 1.1rem; font-weight: 700; margin: 0; color: var(--text-main); letter-spacing: -0.5px; }
        header p { font-size: 0.80rem; color: var(--text-muted); margin: 1px 0 0 0; }

        .control-panel {
            background-color: var(--panel-bg); 
            padding: 8px 12px; 
            border-radius: 8px;
            border: 1px solid var(--border); 
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-left-zone, .panel-right-zone {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-item-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .btn-upload-compact {
            background-color: var(--panel-card); 
            color: var(--text-main);
            border: 1px solid var(--border); 
            padding: 0 10px; 
            border-radius: 6px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 5px;
            font-size: 0.7rem; 
            font-weight: 600; 
            height: 28px; 
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-upload-compact:hover { 
            border-color: var(--accent); 
            color: var(--accent); 
            background: var(--accent-glow); 
        }
        .btn-upload-compact svg { width: 12px; height: 12px; fill: currentColor; }

        .font-selector-compact {
            background-color: var(--panel-card); 
            color: var(--text-main);
            border: 1px solid var(--border); 
            padding: 0 8px; 
            border-radius: 6px;
            font-size: 0.7rem; 
            font-weight: 600; 
            outline: none; 
            cursor: pointer;
            height: 28px; 
            min-width: 130px;
            max-width: 180px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .color-picker-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            background: var(--panel-card); 
            padding: 0 6px 0 8px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            height: 28px; 
        }
        .color-hex-text {
            font-size: 0.68rem; 
            font-weight: 700; 
            color: var(--accent);
        }
        .color-dot-input {
            -webkit-appearance: none; 
            border: 1px solid var(--border);
            width: 16px; height: 16px; 
            border-radius: 50%; 
            cursor: pointer;
            background: none; 
            padding: 0;
            margin: 0;
        }
        .color-dot-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-dot-input::-webkit-color-swatch { border: none; border-radius: 50%; }

        .slider-wrapper-compact {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--panel-card);
            padding: 0 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            height: 28px;
        }
        .font-slider-compact { 
            -webkit-appearance: none; 
            width: 75px; 
            height: 3px; 
            background: var(--border); 
            border-radius: 10px; 
            outline: none; 
        }
        .font-slider-compact::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            background: var(--accent); 
            cursor: pointer; 
        }
        .size-indicator-compact { 
            font-size: 0.68rem; 
            font-weight: 700; 
            color: var(--accent); 
            min-width: 32px; 
            text-align: right;
        }

        .font-meta { background: var(--panel-card); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; display: none; }
        .meta-grid { display: flex; gap: 20px; align-items: center; }
        .meta-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; }
        .meta-item span { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.62rem; }

        .glyph-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 8px; }
        .glyph-box {
            background-color: var(--panel-bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 6px 4px; text-align: center; position: relative;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center; min-height: 115px; cursor: pointer;
        }
        .glyph-box:hover { border-color: var(--accent); transform: translateY(-2px); }
        .glyph-svg-wrapper { width: 100%; height: 65px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; background: var(--svg-bg); border-radius: 6px; }
        .glyph-svg-wrapper svg { width: 100%; height: 100%; }
        .glyph-name { font-size: 0.62rem; font-weight: 500; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .glyph-meta-info { font-size: 0.62rem; font-weight: 600; color: var(--accent); }
        .glyph-index { position: absolute; top: 4px; left: 6px; font-size: 0.55rem; font-weight: 600; color: var(--text-muted); opacity: 0.3; }
        
        .loading { text-align: center; font-size: 0.78rem; font-weight: 600; color: var(--accent); display: none; padding: 15px 0; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 12, 0.85); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: var(--panel-bg); padding: 18px; border-radius: 18px;
            width: 95%; max-width: 880px; position: relative; border: 1px solid var(--border);
            transform: scale(0.96); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .close-modal {
            position: absolute; top: 12px; right: 12px; background: var(--panel-card); border: 1px solid var(--border);
            width: 28px; height: 28px; border-radius: 50%; font-size: 0.75rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: var(--text-main); z-index: 20;
        }

        .modal-top-bar { 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            margin-bottom: 4px; 
        }
        
        .modal-center-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .toggle-icon-btn {
            background: var(--panel-card); border: 1px solid var(--border); color: var(--text-muted);
            width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .toggle-icon-btn.active { color: var(--accent); background: var(--accent-glow); border-color: var(--accent); }
        .toggle-icon-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        .modal-svg-container {
            width: 100%; height: 380px; margin: 10px 0; background: var(--svg-bg); border-radius: 12px; border: 1px solid var(--border);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: grab;
        }
        .modal-svg-container:active { cursor: grabbing; }
        .modal-svg-container svg { width: 100%; height: 100%; display: block; pointer-events: none; }

        .zoom-slider-container {
            display: flex; align-items: center; gap: 10px; background: var(--panel-card);
            padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px;
        }
        .zoom-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--panel-card); color: var(--text-main); border: 1px solid var(--border);
            width: 36px; height: 36px; border-radius: 50%; font-size: 0.8rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .prev-btn { left: -45px; }
        .next-btn { right: -45px; }

        .metrics-hud-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
        .hud-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 2px; background: var(--panel-card); border-radius: 6px; border: 1px solid var(--border); }
        .hud-item span { font-size: 0.58rem; font-weight: 700; color: var(--text-muted); margin-bottom: 2px; }
        .hud-item strong { font-size: 0.8rem; color: var(--text-main); }

        .modal-bottom-header { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 8px; gap: 10px; }
        .modal-meta-left { min-width: 120px; }
        .modal-meta-left h3 { margin: 0; font-size: 1rem; font-weight: 700; color: var(--text-main); }
        
        .modal-review-input-wrapper { flex-grow: 1; position: relative; display: flex; align-items: center; }
        .modal-review-input { width: 100%; height: 38px; background-color: var(--svg-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; color: var(--text-main); font-size: 0.9rem; outline: none; transition: all 0.2s; }
        .modal-review-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        .action-buttons-group { display: flex; align-items: center; gap: 6px; }
        .btn-action-icon {
            background: var(--panel-card); color: var(--text-muted); border: 1px solid var(--border);
            width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .btn-action-icon svg { width: 16px; height: 16px; fill: currentColor; }
        
        #full-card-screenshot-btn { color: var(--accent); border-color: rgba(56, 189, 248, 0.4); background: var(--accent-glow); }
        #full-card-screenshot-btn:hover { background: var(--accent); color: var(--bg-main); }
        #screenshot-btn:hover { border-color: var(--accent); color: var(--accent); }

        @media (max-width: 768px) {
            .control-panel { flex-direction: column; align-items: stretch; gap: 8px; padding: 10px; }
            .panel-left-zone, .panel-right-zone { justify-content: space-between; width: 100%; }
            .font-selector-compact { max-width: 100%; flex-grow: 1; }
            .modal-bottom-header { flex-direction: column; align-items: stretch; gap: 10px; }
        }

        @media (max-width: 1024px) {
            .prev-btn { left: 10px; top: auto; bottom: -60px; }
            .next-btn { right: 10px; top: auto; bottom: -60px; }
            .modal-content { margin-bottom: 70px; }
            .modal-svg-container { height: 300px; }
        }

        @media (max-width: 600px) {
            .meta-grid { flex-direction: column; align-items: flex-start; gap: 6px; }
            .metrics-hud-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .action-buttons-group { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container">
            <img src="https://i.postimg.cc/MHz1Gncw/IMG-3178.png" alt="Logo" class="app-logo">
            <div>
                <h1>KHMER GLYPH INSPECTOR</h1>
                <p>កម្មវិធីពិនិត្យមើលពុម្ពអក្សរ</p>
            </div>
        </div>
    </header>

    <div class="control-panel">
        <div class="panel-left-zone">
            <div class="control-item-wrapper">
                <label for="font-file" class="btn-upload-compact">
                    <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm0-10h4v6h6v-6h4l-7-7-7 7z"/></svg>
                    Upload
                </label>
                <input type="file" id="font-file" accept=".ttf,.otf" style="display: none;">
            </div>
            <div class="control-item-wrapper" id="font-selector-group" style="display: none;">
                <select id="font-history-select" class="font-selector-compact"></select>
            </div>
        </div>

        <div class="panel-right-zone">
            <div class="control-item-wrapper">
                <span class="panel-label">Color</span>
                <div class="color-picker-wrapper">
                    <span id="color-code" class="color-hex-text">#DCAC57</span>
                    <input type="color" id="glyph-color-picker" class="color-dot-input" value="#dcac57">
                </div>
            </div>
            <div class="control-item-wrapper">
                <span class="panel-label">Zoom Grid</span>
                <div class="slider-wrapper-compact">
                    <input type="range" id="size-slider" class="font-slider-compact" min="40" max="90" value="65">
                    <span id="size-value" class="size-indicator-compact">65px</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="font-meta-block" class="font-meta"></div>
    <div id="loading-text" class="loading">⏳ កំពុងវិភាគ និងគណនាទម្រង់វ៉ិចទ័រ...</div>
    <div class="glyph-grid" id="glyph-container"></div>
</div>

<div class="modal-overlay" id="glyph-modal">
    <div class="modal-content" id="capture-area">
        <button class="close-modal" id="close-modal-btn" data-html2canvas-ignore="true">✕</button>
        <button class="nav-btn prev-btn" id="prev-btn" data-html2canvas-ignore="true">◀</button>
        <button class="nav-btn next-btn" id="next-btn" data-html2canvas-ignore="true">▶</button>

        <div class="modal-top-bar" data-html2canvas-ignore="true">
            <div style="font-size: 0.62rem; color: var(--text-muted); font-weight: 700;" id="modal-index">GLYPH INDEX: #0</div>
            
            <div class="modal-center-actions">
                <button class="toggle-icon-btn active" id="toggle-lines-btn" title="បើក/បិទ ខ្សែបន្ទាត់ដេក (Metrics Lines)">
                    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <button class="toggle-icon-btn active" id="toggle-labels-btn" title="បើក/បិទ ស្លាកសញ្ញាអក្សរ (Metrics Labels)">
                    <svg viewBox="0 0 24 24" style="stroke: currentColor; fill: none; stroke-width: 2;"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M7 15v-4a2 2 0 0 1 4 0v4M7 12h4M15 10v5M17 10v5"></path></svg>
                </button>
                <button class="toggle-icon-btn active" id="toggle-side-lines-btn" title="បើក/បិទ ខ្សែបន្ទាត់ឈរសងខាង (Side Bearings)">
                    <svg viewBox="0 0 24 24"><line x1="6" y1="3" x2="6" y2="21"></line><line x1="18" y1="3" x2="18" y2="21"></line></svg>
                </button>
            </div>
            
            <div></div>
        </div>
        
        <div class="modal-svg-container" id="modal-svg-holder"></div>
        
        <div class="zoom-slider-container" data-html2canvas-ignore="true">
            <span class="zoom-label">🔍 Zoom</span>
            <input type="range" id="popup-zoom-slider" class="font-slider-compact" style="flex-grow:1;" min="0.3" max="5.0" step="0.02" value="1.0">
            <span id="popup-zoom-value" class="size-indicator-compact" style="min-width: 45px;">100%</span>
            <button id="reset-zoom-btn" style="background: var(--panel-bg); border: 1px solid var(--border); border-radius: 6px; font-size: 0.62rem; padding: 2px 6px; cursor: pointer; color: var(--text-main);">Reset</button>
        </div>
        
        <div class="metrics-hud-grid">
            <div class="hud-item" style="border-top: 2px solid #f43f5e;"><span style="color:#f43f5e;">ASCENDER</span><strong id="hud-asc">-</strong></div>
            <div class="hud-item" style="border-top: 2px solid #f59e0b;"><span style="color:#f59e0b;">CAP HEIGHT</span><strong id="hud-cap">-</strong></div>
            <div class="hud-item" style="border-top: 2px solid #10b981;"><span style="color:#10b981;">BASELINE</span><strong>0</strong></div>
            <div class="hud-item" style="border-top: 2px solid #3b82f6;"><span style="color:#3b82f6;">DESCENDER</span><strong id="hud-desc">-</strong></div>
            <div class="hud-item" style="border-top: 2px solid #a855f7;"><span style="color:#a855f7;">ADV WIDTH</span><strong id="hud-width">-</strong></div>
        </div>

        <div class="modal-bottom-header">
            <div class="modal-meta-left">
                <h3 id="modal-name">Name</h3>
                <div style="font-size: 0.72rem; color: var(--accent); margin-top: 2px;" id="modal-unicode">Unicode: U+0000</div>
            </div>
            
            <div class="modal-review-input-wrapper">
                <input type="text" id="modal-review-text-field" class="modal-review-input" placeholder="វាយអត្ថបទសាកល្បងផ្គុំពាក្យខ្មែរ (ឧ. ខ្ញុំ, កម្ពុជា, ផ្ញើជើង)...">
            </div>
            
            <div class="action-buttons-group">
                <button class="btn-action-icon" id="full-card-screenshot-btn" title="📸 ថតរូបផ្ទាំងប្រអប់ទាំងមូល">
                    <svg viewBox="0 0 24 24"><path d="M4 5h3l2-3h6l2 3h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm8 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 1.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM18 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
                </button>
                <button class="btn-action-icon" id="screenshot-btn" title="🖼️ ថតយកតែរូបតួអក្សរ">
                    <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const fontFileInput = document.getElementById('font-file');
    const fontHistorySelect = document.getElementById('font-history-select');
    const fontSelectorGroup = document.getElementById('font-selector-group');
    const glyphColorPicker = document.getElementById('glyph-color-picker');
    const colorCode = document.getElementById('color-code');
    const glyphContainer = document.getElementById('glyph-container');
    const loadingText = document.getElementById('loading-text');
    const fontMetaBlock = document.getElementById('font-meta-block');
    const sizeSlider = document.getElementById('size-slider');
    const sizeValue = document.getElementById('size-value');
    
    const glyphModal = document.getElementById('glyph-modal');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const modalSvgHolder = document.getElementById('modal-svg-holder');
    const modalIndex = document.getElementById('modal-index');
    const modalName = document.getElementById('modal-name');
    const modalUnicode = document.getElementById('modal-unicode');
    const modalReviewTextField = document.getElementById('modal-review-text-field');
    
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const toggleLinesBtn = document.getElementById('toggle-lines-btn');
    const toggleLabelsBtn = document.getElementById('toggle-labels-btn');
    const toggleSideLinesBtn = document.getElementById('toggle-side-lines-btn');

    const popupZoomSlider = document.getElementById('popup-zoom-slider');
    const popupZoomValue = document.getElementById('popup-zoom-value');
    const resetZoomBtn = document.getElementById('reset-zoom-btn');
    const screenshotBtn = document.getElementById('screenshot-btn');
    const fullCardScreenshotBtn = document.getElementById('full-card-screenshot-btn');

    const hudAsc = document.getElementById('hud-asc');
    const hudCap = document.getElementById('hud-cap');
    const hudDesc = document.getElementById('hud-desc');
    const hudWidth = document.getElementById('hud-width');

    let currentFont = null;
    let currentBase64Font = ""; 
    let glyphScale = 65;
    let selectedGlyphIndex = 0;
    let chosenGlyphColor = "#dcac57"; 
    let showVectorLines = true; 
    let showMetricsLabels = true; // បង្កើត State ថ្មីសម្រាប់គ្រប់គ្រងការ បើក/បិទ ស្លាកសញ្ញាអក្សរ
    let showSideLines = true; 
    
    let baseZoomLevel = 1.0;
    let panX = 0; let panY = 0;
    let isDragging = false;
    let startX = 0; let startY = 0;

    const baseW = 860;
    const baseH = 420;
    const fontUniqueId = "LiveUploadedKhmerFont";

    document.addEventListener('keydown', function(e) {
        if (!glyphModal.classList.contains('active')) return;
        if (e.key === 'ArrowLeft') {
            if (selectedGlyphIndex > 0) { selectedGlyphIndex--; openGlyphModal(selectedGlyphIndex); }
        } else if (e.key === 'ArrowRight') {
            if (selectedGlyphIndex < currentFont.numGlyphs - 1) { selectedGlyphIndex++; openGlyphModal(selectedGlyphIndex); }
        } else if (e.key === 'Escape') { closeModal(); }
    });

    modalReviewTextField.addEventListener('input', function() {
        if (currentFont) updateModalContent(false); 
    });

    toggleLinesBtn.addEventListener('click', function() {
        showVectorLines = !showVectorLines;
        toggleLinesBtn.classList.toggle('active', showVectorLines);
        if (currentFont) updateModalContent(false);
    });

    // បន្ថែមព្រឹត្តិការណ៍ Click ទៅលើប៊ូតុងថ្មីសម្រាប់ បើក/បិទ ស្លាកសញ្ញាអក្សរ (Badges)
    toggleLabelsBtn.addEventListener('click', function() {
        showMetricsLabels = !showMetricsLabels;
        toggleLabelsBtn.classList.toggle('active', showMetricsLabels);
        if (currentFont) updateModalContent(false);
    });

    toggleSideLinesBtn.addEventListener('click', function() {
        showSideLines = !showSideLines;
        toggleSideLinesBtn.classList.toggle('active', showSideLines);
        if (currentFont) updateModalContent(false);
    });

    glyphColorPicker.addEventListener('input', function(e) {
        chosenGlyphColor = e.target.value;
        colorCode.innerText = chosenGlyphColor.toUpperCase();
        if (currentFont) {
            renderGlyphsSVG(currentFont);
            if (glyphModal.classList.contains('active')) updateModalContent(false);
        }
    });

    sizeSlider.addEventListener('input', function(e) {
        glyphScale = parseInt(e.target.value);
        sizeValue.innerText = glyphScale + 'px';
        if (currentFont) renderGlyphsSVG(currentFont);
    });

    fontFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        loadingText.style.display = 'block';
        fontMetaBlock.style.display = 'none';
        glyphContainer.innerHTML = '';

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const arrayBuffer = event.target.result;
                const dataView = new Uint8Array(arrayBuffer);
                currentFont = opentype.parse(dataView.buffer);
                
                let binary = '';
                const len = dataView.byteLength;
                for (let i = 0; i < len; i++) {
                    binary += String.fromCharCode(dataView[i]);
                }
                const base64FontData = btoa(binary);
                currentBase64Font = base64FontData; 
                
                const oldStyle = document.getElementById('dynamic-font-face');
                if (oldStyle) oldStyle.remove();
                
                const fontDynamicStyle = document.createElement('style');
                fontDynamicStyle.id = 'dynamic-font-face';
                fontDynamicStyle.textContent = `
                    @font-face {
                        font-family: '${fontUniqueId}';
                        src: url('data:font/opentype;base64,${base64FontData}');
                    }
                    .khmer-perfect-text {
                        text-anchor: middle;
                    }
                `;
                
                const captureArea = document.getElementById('capture-area');
                if (captureArea) {
                    captureArea.appendChild(fontDynamicStyle);
                } else {
                    document.head.appendChild(fontDynamicStyle);
                }
                
                fontHistorySelect.innerHTML = `<option value="0">${file.name}</option>`;
                fontSelectorGroup.style.display = 'flex';
                
                displayFontMeta(file.name, currentFont);
                renderGlyphsSVG(currentFont);
            } catch (err) { 
                console.error("ការអានពុម្ពអក្សរមានបញ្ហា៖", err);
                alert("មិនអាចអានឯកសារពុម្ពអក្សរនេះបានទេ! សូមពិនិត្យមើលប្រភេទឯកសារ (.ttf ឬ .otf) ឡើងវិញ។");
                loadingText.style.display = 'none';
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function displayFontMeta(fileName, font) {
        const names = font.names;
        const familyName = names.fontFamily ? (names.fontFamily.en || Object.values(names.fontFamily)[0]) : 'មិនស្គាល់';
        const designerName = names.designer ? (names.designer.en || Object.values(names.designer)[0]) : 'រកមិនឃើញឈ្មោះ';

        fontMetaBlock.innerHTML = `
            <div class="meta-grid">
                <div class="meta-item"><span>Family:</span><strong>${familyName}</strong></div>
                <div class="meta-item"><span>Designer:</span><strong>${designerName}</strong></div>
                <div class="meta-item"><span>Glyphs:</span><strong>${font.numGlyphs}</strong></div>
            </div>
        `;
        fontMetaBlock.style.display = 'block';
    }

    function renderGlyphsSVG(font) {
        glyphContainer.innerHTML = '';
        loadingText.style.display = 'none';
        const glyphs = font.glyphs.glyphs;

        for (let i = 0; i < font.numGlyphs; i++) {
            const glyph = glyphs[i];
            const box = document.createElement('div');
            box.className = 'glyph-box';
            box.addEventListener('click', () => {
                openGlyphModal(i, true); 
            });

            let unicodeStr = glyph.unicode !== undefined ? 'U+' + glyph.unicode.toString(16).toUpperCase().padStart(4, '0') : 'None';
            const svgWrapper = document.createElement('div');
            svgWrapper.className = 'glyph-svg-wrapper';

            const scale = glyphScale;
            const viewW = 120;
            const baselineY = 65;
            
            const fontScale = 1 / font.unitsPerEm * scale;
            const dx = (viewW - ((glyph.advanceWidth || 0) * fontScale)) / 2;
            const pathData = glyph.getPath(dx, baselineY, scale).toPathData(3);

            const svgNS = "http://www.w3.org/2000/svg";
            const svgElement = document.createElementNS(svgNS, "svg");
            svgElement.setAttribute("viewBox", "0 0 120 90");

            if (pathData && glyph.path && glyph.path.commands && glyph.path.commands.length > 0) {
                const pathElement = document.createElementNS(svgNS, "path");
                pathElement.setAttribute("d", pathData);
                pathElement.setAttribute("fill", chosenGlyphColor);
                svgElement.appendChild(pathElement);
            } else {
                const textElement = document.createElementNS(svgNS, "text");
                textElement.setAttribute("x", "50%"); textElement.setAttribute("y", "50%");
                textElement.setAttribute("dominant-baseline", "middle"); textElement.setAttribute("text-anchor", "middle");
                textElement.setAttribute("fill", "var(--text-muted)"); textElement.setAttribute("font-size", "10");
                textElement.style.setProperty("font-family", "'Kantumruy Pro', sans-serif", "important");
                textElement.textContent = glyph.name === 'space' ? '[លំហ]' : '[]';
                svgElement.appendChild(textElement);
            }

            svgWrapper.appendChild(svgElement);
            const nameDiv = document.createElement('div'); nameDiv.className = 'glyph-name'; nameDiv.innerText = glyph.name || 'no-name';
            const metaDiv = document.createElement('div'); metaDiv.className = 'glyph-meta-info'; metaDiv.innerText = unicodeStr;

            box.innerHTML = `<div class="glyph-index">#${i}</div>`;
            box.appendChild(svgWrapper); box.appendChild(nameDiv); box.appendChild(metaDiv);
            glyphContainer.appendChild(box);
        }
    }

    function openGlyphModal(index, updateTextField = true) {
        if (!currentFont) return;
        selectedGlyphIndex = index;
        baseZoomLevel = 1.0; panX = 0; panY = 0;
        popupZoomSlider.value = 1.0; popupZoomValue.innerText = "100%";
        updateModalContent(updateTextField);
        glyphModal.classList.add('active');
    }

    function closeModal() { glyphModal.classList.remove('active'); }

    function updateModalContent(updateTextField = true) {
        const glyphs = currentFont.glyphs.glyphs;
        const glyph = glyphs[selectedGlyphIndex];
        
        modalIndex.innerText = `GLYPH INDEX: #${selectedGlyphIndex} / ${currentFont.numGlyphs - 1}`;
        modalName.innerText = glyph.name || 'no-name';
        modalUnicode.innerText = glyph.unicode !== undefined ? 'Unicode: U+' + glyph.unicode.toString(16).toUpperCase().padStart(4, '0') : 'Unicode: None';
        modalSvgHolder.innerHTML = '';
        
        if (updateTextField) {
            const char = glyph.unicode ? String.fromCharCode(glyph.unicode) : '';
            modalReviewTextField.value = char;
        }

        const uM = currentFont.unitsPerEm;
        const ascender = currentFont.ascender;
        const descender = currentFont.descender;
        const capHeight = currentFont.tables.os2.sCapHeight || (ascender * 0.72); 
        const advanceWidth = glyph.advanceWidth || 0;

        hudAsc.innerText = ascender;
        hudCap.innerText = Math.round(capHeight);
        hudDesc.innerText = descender;
        hudWidth.innerText = Math.round(advanceWidth);

        const totalFontHeight = ascender - descender; 
        const targetRenderHeight = 220;               
        const mScale = (targetRenderHeight / totalFontHeight) * uM; 
        const fScale = mScale / uM; 

        const baselineY = 110 + (ascender * fScale); 
        const ascenderY = baselineY - (ascender * fScale);
        const capHeightY = baselineY - (capHeight * fScale);
        const descenderY = baselineY - (descender * fScale);
        
        const dx = (baseW - (advanceWidth * fScale)) / 2;
        const leftSideLineX = dx;
        const rightSideLineX = dx + (advanceWidth * fScale);

        const svgNS = "http://www.w3.org/2000/svg";
        const svgElement = document.createElementNS(svgNS, "svg");
        svgElement.setAttribute("viewBox", `0 0 ${baseW} ${baseH}`);
        svgElement.id = "target-glyph-svg";

        const styleElement = document.createElementNS(svgNS, "style");
        styleElement.textContent = `
            @font-face {
                font-family: '${fontUniqueId}';
                src: url('data:font/opentype;base64,${currentBase64Font}');
            }
            .bg-rect { fill: #070a10; }
            .v-grid-text { font-family: 'Kantumruy Pro', sans-serif !important; font-size: 10px; font-weight: bold; fill: rgba(168, 85, 247, 0.5); }
            .metric-lbl-txt { font-family: 'Kantumruy Pro', sans-serif !important; font-size: 10px; font-weight: bold; fill: #ffffff; }
        `;
        svgElement.appendChild(styleElement);

        const bgRect = document.createElementNS(svgNS, "rect");
        bgRect.setAttribute("width", "100%"); bgRect.setAttribute("height", "100%");
        bgRect.className.baseVal = "bg-rect";
        svgElement.appendChild(bgRect);

        function createHMetricRow(y, text, rawValue, lineColor, tagColor) {
            const g = document.createElementNS(svgNS, "g");
            const line = document.createElementNS(svgNS, "line");
            line.setAttribute("x1", "-10000"); line.setAttribute("y1", y);
            line.setAttribute("x2", "10000"); line.setAttribute("y2", y);
            line.setAttribute("stroke", lineColor); line.setAttribute("stroke-width", "0.5");
            line.setAttribute("stroke-dasharray", "4,4");
            g.appendChild(line);

            // លក្ខខណ្ឌពិនិត្យ៖ បើសិនជា showMetricsLabels = true ទើបបង្កើតផ្ទាំងស្លាកសញ្ញាអក្សរពណ៌
            if (showMetricsLabels) {
                const rect = document.createElementNS(svgNS, "rect");
                rect.setAttribute("x", "15"); rect.setAttribute("y", y - 9);
                rect.setAttribute("width", "75"); rect.setAttribute("height", "18");
                rect.setAttribute("rx", "4"); rect.setAttribute("fill", tagColor);
                rect.setAttribute("opacity", "0.75");
                g.appendChild(rect);

                const svgText = document.createElementNS(svgNS, "text");
                svgText.setAttribute("x", "20"); svgText.setAttribute("y", y + 4);
                svgText.className.baseVal = "metric-lbl-txt";
                svgText.textContent = `${text}:${rawValue}`;
                g.appendChild(svgText);
            }
            return g;
        }

        function createVMetricLine(x, text, lineColor) {
            const g = document.createElementNS(svgNS, "g");
            const line = document.createElementNS(svgNS, "line");
            line.setAttribute("x1", x); line.setAttribute("y1", "-10000");
            line.setAttribute("x2", x); line.setAttribute("y2", "10000");
            line.setAttribute("stroke", lineColor); line.setAttribute("stroke-width", "0.5");
            line.setAttribute("stroke-dasharray", "3,3");
            g.appendChild(line);

            if (showMetricsLabels) {
                const svgText = document.createElementNS(svgNS, "text");
                svgText.setAttribute("x", x + 6); svgText.setAttribute("y", baselineY + 22);
                svgText.className.baseVal = "v-grid-text";
                svgText.textContent = text;
                g.appendChild(svgText);
            }
            return g;
        }

        if (showVectorLines) {
            svgElement.appendChild(createHMetricRow(ascenderY, "ASC", ascender, "rgba(244, 63, 94, 0.4)", "#f43f5e"));  
            svgElement.appendChild(createHMetricRow(capHeightY, "CAP", Math.round(capHeight), "rgba(245, 158, 11, 0.4)", "#f59e0b")); 
            svgElement.appendChild(createHMetricRow(baselineY, "BASE", 0, "rgba(16, 185, 129, 0.4)", "#10b981"));  
            svgElement.appendChild(createHMetricRow(descenderY, "DESC", descender, "rgba(59, 130, 246, 0.4)", "#3b82f6")); 
        }

        if (showSideLines) {
            svgElement.appendChild(createVMetricLine(leftSideLineX, "LSB", "rgba(168, 85, 247, 0.35)"));
            svgElement.appendChild(createVMetricLine(rightSideLineX, "RSB/WD", "rgba(168, 85, 247, 0.45)"));
        }

        const textGroup = document.createElementNS(svgNS, "g");
        
        const userTypedText = modalReviewTextField.value;
        const glyphChar = glyph.unicode ? String.fromCharCode(glyph.unicode) : '';
        const glyphScaleFactor = fScale * uM;

        if (userTypedText && userTypedText !== glyphChar) {
            const nativeTextNode = document.createElementNS(svgNS, "text");
            nativeTextNode.setAttribute("x", "50%");
            nativeTextNode.setAttribute("y", baselineY);
            nativeTextNode.setAttribute("class", "khmer-perfect-text");
            nativeTextNode.setAttribute("font-size", glyphScaleFactor);
            nativeTextNode.setAttribute("fill", chosenGlyphColor);
            nativeTextNode.style.setProperty("font-family", `'${fontUniqueId}', 'Kantumruy Pro', sans-serif`, "important");
            nativeTextNode.textContent = userTypedText;
            textGroup.appendChild(nativeTextNode);
        } else {
            const pathData = glyph.getPath(dx, baselineY, glyphScaleFactor).toPathData(3);
            
            if (pathData && glyph.path && glyph.path.commands && glyph.path.commands.length > 0) {
                const pathElement = document.createElementNS(svgNS, "path");
                pathElement.setAttribute("d", pathData);
                pathElement.setAttribute("fill", chosenGlyphColor);
                textGroup.appendChild(pathElement);
            } else {
                const textElement = document.createElementNS(svgNS, "text");
                textElement.setAttribute("x", "50%"); textElement.setAttribute("y", "50%");
                textElement.setAttribute("dominant-baseline", "middle"); textElement.setAttribute("text-anchor", "middle");
                textElement.setAttribute("fill", "var(--text-muted)"); textElement.setAttribute("font-size", "14");
                textElement.textContent = glyph.name === 'space' ? '[លំហ - Space]' : '[គ្មានរូបរាង - Empty]';
                textGroup.appendChild(textElement);
            }
        }
        svgElement.appendChild(textGroup);

        modalSvgHolder.appendChild(svgElement);
        setupZoomAndPanControl();
    }

    function setupZoomAndPanControl() {
        const svgElement = document.getElementById('target-glyph-svg');
        
        function updateViewBox() {
            if (!svgElement) return;
            const newW = baseW / baseZoomLevel; const newH = baseH / baseZoomLevel;
            const newX = ((baseW - newW) / 2) - panX; const newY = ((baseH - newH) / 2) - panY;
            svgElement.setAttribute("viewBox", `${newX} ${newY} ${newW} ${newH}`);
        }

        popupZoomSlider.oninput = function(e) {
            baseZoomLevel = parseFloat(e.target.value);
            popupZoomValue.innerText = Math.round(baseZoomLevel * 100) + "%";
            updateViewBox();
        };

        const holder = modalSvgHolder;

        function startDrag(e) {
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX; startY = clientY;
        }

        function doDrag(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaX = clientX - startX; const deltaY = clientY - startY;
            startX = clientX; startY = clientY;
            panX += (deltaX / baseZoomLevel) * (baseW / holder.clientWidth);
            panY += (deltaY / baseZoomLevel) * (baseH / holder.clientHeight);
            updateViewBox();
        }

        function endDrag() { isDragging = false; }

        holder.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', endDrag);
        holder.addEventListener('touchstart', startDrag, { passive: true });
        holder.addEventListener('touchmove', doDrag, { passive: true });
        holder.addEventListener('touchend', endDrag);

        resetZoomBtn.onclick = function() {
            baseZoomLevel = 1.0; panX = 0; panY = 0;
            popupZoomSlider.value = 1.0; popupZoomValue.innerText = "100%";
            updateViewBox();
        };
        updateViewBox();
    }

    screenshotBtn.addEventListener('click', function() {
        const svgElement = document.getElementById('target-glyph-svg');
        if (!svgElement) return;

        const clonedSvg = svgElement.cloneNode(true);
        clonedSvg.setAttribute("viewBox", `0 0 ${baseW} ${baseH}`);

        const svgString = new XMLSerializer().serializeToString(clonedSvg);
        const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const URL = window.URL || window.webkitURL || window;
        const blobURL = URL.createObjectURL(svgBlob);
        
        const image = new Image();
        image.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = baseW * 2; canvas.height = baseH * 2;
            const context = canvas.getContext('2d');
            context.drawImage(image, 0, 0, baseW * 2, baseH * 2);
            
            const pngURL = canvas.toDataURL('image/png');
            const downloadLink = document.createElement('a');
            downloadLink.href = pngURL; downloadLink.download = `Glyph_Vector_${selectedGlyphIndex}.png`;
            document.body.appendChild(downloadLink); downloadLink.click(); document.body.removeChild(downloadLink);
            URL.revokeObjectURL(blobURL);
        };
        image.src = blobURL;
    });

    fullCardScreenshotBtn.addEventListener('click', function() {
        const captureArea = document.getElementById('capture-area');
        if (!captureArea) return;

        html2canvas(captureArea, {
            backgroundColor: '#131926', scale: 2, logging: false, useCORS: true
        }).then(canvas => {
            const pngURL = canvas.toDataURL('image/png');
            const downloadLink = document.createElement('a');
            downloadLink.href = pngURL; downloadLink.download = `Glyph_Full_Box_${selectedGlyphIndex}.png`;
            document.body.appendChild(downloadLink); downloadLink.click(); document.body.removeChild(downloadLink);
        }).catch(err => console.error(err));
    });

    prevBtn.addEventListener('click', (e) => { e.stopPropagation(); if (selectedGlyphIndex > 0) { selectedGlyphIndex--; openGlyphModal(selectedGlyphIndex, true); } });
    nextBtn.addEventListener('click', (e) => { e.stopPropagation(); if (selectedGlyphIndex < currentFont.numGlyphs - 1) { selectedGlyphIndex++; openGlyphModal(selectedGlyphIndex, true); } });
    closeModalBtn.addEventListener('click', closeModal);
    glyphModal.addEventListener('click', (e) => { if (e.target === glyphModal) closeModal(); });
</script>

</body>
</html>
